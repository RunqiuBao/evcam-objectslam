<?xml version="1.0" encoding="UTF-8" ?>
<log4j:configuration xmlns:log4j="http://jakarta.apache.org/log4j/">
    <!-- Output the log message to system console
    -->
    <appender name="MyConsoleAppender" class="org.apache.log4j.ConsoleAppender">
        <param name="Target" value="System.out"/>
        <layout class="org.apache.log4j.PatternLayout">
            <param name="ConversionPattern" value="%5p [t] (F:L) - m%n"/>
        </layout>
    </appender>

    <!-- On application startup, a log file names "project.log" will be created if not exist.
         When the log file reaches beyond 10 MB, it will be renamed "project.log.1", when the log index reach
         "project.log.5", the next rename will be back to "project.log.1" and overwrite the log. 
    -->
    <appender name ="MyRollingAppenderSize" class="org.apache.log4j.RollingFileAppender">
        <param name="file" value="project.log"/>
        <param name="append" value="true"/>
        <param name="MaxFileSize" value="100KB"/>
        <param name="MaxBackupIndex" value="100"/>
        <layout class="org.apache.log4j.PatternLayout">
            <param name="ConversionPattern" value="%d %5p [t] (F:L) - m%n"/>
        </layout>
    </appender>

    <!-- Setup the root category, add the appenders and set the default level 5 level of logging,
         ALL < DEBUG < INFO < WARN < ERROR < FATAL. The root level is set with INFO, which mean any message greater or same
         as INFO will be logged down. 
         To log all regardless of logging level, set <priority value="ALL">
    -->
    <root>
        <priority value="all"/>
        <appender-ref ref="MyRollingAppenderSize"/>
        <appender-ref ref="MyConsoleAppender"/>
    </root>
</log4j:configuration>